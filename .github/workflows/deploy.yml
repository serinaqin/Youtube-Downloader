name: Deploy to Mac

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_DIR: /Users/newuser/dev/Youtube-Downloader

jobs:
  deploy:
    runs-on: [self-hosted, macOS]

    steps:
      - name: Pull latest code
        run: |
          git -C "${{ env.PROJECT_DIR }}" fetch origin main
          git -C "${{ env.PROJECT_DIR }}" reset --hard origin/main

      - name: Generate .env from GitHub Variables
        run: |
          {
            echo "AWS_ACCESS_KEY_ID=${{ vars.AWS_ACCESS_KEY_ID }}"
            echo "AWS_SECRET_ACCESS_KEY=${{ vars.AWS_SECRET_ACCESS_KEY }}"
            echo "AWS_REGION=${{ vars.AWS_REGION }}"
            echo "S3_BUCKET_NAME=${{ vars.S3_BUCKET_NAME }}"
            echo "DOWNLOAD_DIR=${{ vars.DOWNLOAD_DIR }}"
            echo "PORT=${{ vars.PORT }}"
          } > "${{ env.PROJECT_DIR }}/.env"

      - name: Install dependencies
        run: pip3 install -r "${{ env.PROJECT_DIR }}/requirements.txt"

      - name: Restart server
        run: |
          launchctl kickstart -k "gui/$(id -u)/com.youdescribe.youtube-downloader"
          sleep 3
          STATUS=$(launchctl list com.youdescribe.youtube-downloader 2>&1)
          echo "$STATUS"
          # PID is the first field; 0 or - means not running
          PID=$(echo "$STATUS" | awk 'NR==2{print $1}')
          if [[ "$PID" == "-" || "$PID" == "0" ]]; then
            echo "ERROR: service failed to start"
            tail -20 "${{ env.PROJECT_DIR }}/logs/service-stderr.log" || true
            exit 1
          fi
          echo "YoutubeDownloader is running (PID $PID)"
