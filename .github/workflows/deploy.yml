name: Deploy to Local PC

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_DIR: C:\Users\YDX2\dev\Youtube-Downloader
  NSSM_EXE: C:\Users\YDX2\AppData\Local\Microsoft\WinGet\Packages\NSSM.NSSM_Microsoft.Winget.Source_8wekyb3d8bbwe\nssm-2.24-101-g897c7ad\win64\nssm.exe

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        shell: bash
        run: |
          cd "/c/Users/YDX2/dev/Youtube-Downloader"
          git fetch origin main
          git reset --hard origin/main

      - name: Generate .env from GitHub Variables
        shell: bash
        run: |
          cat > "/c/Users/YDX2/dev/Youtube-Downloader/.env" << 'ENVEOF'
          AWS_ACCESS_KEY_ID=${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ vars.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ vars.AWS_REGION }}
          S3_BUCKET_NAME=${{ vars.S3_BUCKET_NAME }}
          DOWNLOAD_DIR=${{ vars.DOWNLOAD_DIR }}
          PORT=${{ vars.PORT }}
          ENVEOF

      - name: Install dependencies
        shell: bash
        run: pip install -r "/c/Users/YDX2/dev/Youtube-Downloader/requirements.txt"

      - name: Restart server
        shell: powershell
        run: |
          $nssm = "${{ env.NSSM_EXE }}"
          & $nssm restart YoutubeDownloader
          Start-Sleep -Seconds 3
          $status = & $nssm status YoutubeDownloader
          if ($status -ne "SERVICE_RUNNING") {
            Write-Error "Service failed to start. Status: $status"
            exit 1
          }
          Write-Host "YoutubeDownloader service is running"
