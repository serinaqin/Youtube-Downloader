name: Deploy to Local PC

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_DIR: C:\Users\YDX2\dev\Youtube-Downloader
  NSSM_EXE: C:\Users\YDX2\AppData\Local\Microsoft\WinGet\Packages\NSSM.NSSM_Microsoft.Winget.Source_8wekyb3d8bbwe\nssm-2.24-101-g897c7ad\win64\nssm.exe
  GIT_EXE: C:\Program Files\Git\bin\git.exe
  PIP_EXE: C:\Users\YDX2\AppData\Local\Python\bin\pip.exe

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        shell: powershell
        run: |
          & "${{ env.GIT_EXE }}" config --global --add safe.directory C:/Users/YDX2/dev/Youtube-Downloader
          Set-Location "${{ env.PROJECT_DIR }}"
          & "${{ env.GIT_EXE }}" fetch origin main
          & "${{ env.GIT_EXE }}" reset --hard origin/main

      - name: Generate .env from GitHub Variables
        shell: powershell
        run: |
          $envContent = @"
          AWS_ACCESS_KEY_ID=${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ vars.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ vars.AWS_REGION }}
          S3_BUCKET_NAME=${{ vars.S3_BUCKET_NAME }}
          DOWNLOAD_DIR=${{ vars.DOWNLOAD_DIR }}
          PORT=${{ vars.PORT }}
          "@
          [System.IO.File]::WriteAllText("${{ env.PROJECT_DIR }}\.env", $envContent)

      - name: Install dependencies
        shell: powershell
        run: |
          & "${{ env.PIP_EXE }}" install -r "${{ env.PROJECT_DIR }}\requirements.txt"

      - name: Restart server
        shell: powershell
        run: |
          $nssm = "${{ env.NSSM_EXE }}"
          & $nssm stop YoutubeDownloader 2>&1 | Out-Null
          Start-Sleep -Seconds 2
          & $nssm start YoutubeDownloader
          Start-Sleep -Seconds 3
          $status = & $nssm status YoutubeDownloader
          Write-Host "YoutubeDownloader status: $status"
          if ($status -ne "SERVICE_RUNNING") {
            Write-Host "Retrying start..."
            & $nssm start YoutubeDownloader 2>&1 | Out-Null
            Start-Sleep -Seconds 3
            $status = & $nssm status YoutubeDownloader
          }
          if ($status -ne "SERVICE_RUNNING") {
            Write-Error "Service failed to start. Status: $status"
            exit 1
          }
          Write-Host "YoutubeDownloader service is running"
